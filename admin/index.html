<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | СТРОЙ БАЗА</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
        .topbar { background: #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 12px; }
        .topbar h1 { font-size: 20px; color: #f8fafc; }
        .container { max-width: 1300px; margin: 0 auto; padding: 24px; }
        .message { padding: 16px 24px; margin: 0 0 20px 0; font-weight: 600; text-align: center; border-radius: 12px; }
        .message.success { background: #065f46; color: #6ee7b7; }
        .message.error { background: #7f1d1d; color: #fca5a5; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid #334155; }
        .tab { padding: 12px 24px; background: transparent; border: none; color: #94a3b8; font-size: 15px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: #f1f5f9; }
        .tab.active { color: #f8fafc; border-bottom-color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .add-btn { background: #22c55e; color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .add-btn:hover { background: #16a34a; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-input { padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 14px; width: 300px; outline: none; }
        .search-input:focus { border-color: #3b82f6; }
        .save-all-btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .save-all-btn:hover { background: #2563eb; }
        
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 16px; overflow: hidden; }
        th { background: #334155; padding: 12px 16px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
        td { padding: 12px 16px; border-bottom: 1px solid #334155; font-size: 14px; }
        tr:hover td { background: #1e3a5f; }
        .actions { display: flex; gap: 8px; }
        .edit-btn, .del-btn { padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; border: none; color: white; }
        .edit-btn { background: #3b82f6; }
        .edit-btn:hover { background: #2563eb; }
        .del-btn { background: #ef4444; }
        .del-btn:hover { background: #dc2626; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #1e293b; border-radius: 24px; padding: 30px; width: 500px; max-width: 90vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal h2 { margin-bottom: 20px; color: #f8fafc; font-size: 22px; }
        .modal label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 13px; font-weight: 600; margin-top: 16px; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 14px; margin-top: 4px; font-family: inherit; outline: none; }
        .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #3b82f6; }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .modal-buttons button { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
        .save-btn { background: #22c55e; color: white; }
        .save-btn:hover { background: #16a34a; }
        .cancel-btn { background: #475569; color: white; }
        .cancel-btn:hover { background: #334155; }
        
        .settings-bar { background: #1e3a5f; padding: 16px; border-radius: 12px; margin-bottom: 20px; }
        .settings-bar label { color: #93c5fd; font-size: 13px; display: block; margin-bottom: 6px; }
        .settings-bar input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 13px; outline: none; }
        .settings-bar input:focus { border-color: #3b82f6; }
        .settings-bar small { color: #94a3b8; display: block; margin-top: 6px; }
        
        .icon-option:hover { transform: scale(1.15); }
    </style>
</head>
<body>

<div class="topbar">
    <h1>🔨 СТРОЙ БАЗА — Управление</h1>
    <button class="save-all-btn" id="saveAllBtn">💾 Сохранить всё на сайт</button>
</div>

<div class="container">
    <div id="messageContainer"></div>
    
    <div class="settings-bar">
        <label>🔑 GitHub Token</label>
        <input type="password" id="githubToken" placeholder="ghp_...">
        <small>GitHub → Settings → Developer settings → Tokens (classic) → repo</small>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-tab="products">📦 Товары</button>
        <button class="tab" data-tab="categories">📂 Категории</button>
    </div>
    
    <div class="tab-content active" id="tab-products">
        <div class="toolbar">
            <button class="add-btn" id="addProductBtn">+ Добавить товар</button>
            <input type="text" class="search-input" id="searchProducts" placeholder="🔍 Поиск по товарам...">
        </div>
        <table>
            <thead><tr><th>Фото</th><th>Название</th><th>Категория</th><th>Цена</th><th>Действия</th></tr></thead>
            <tbody id="productsTable"></tbody>
        </table>
        <p style="text-align: center; margin-top: 16px; color: #94a3b8;" id="productCount"></p>
    </div>
    
    <div class="tab-content" id="tab-categories">
        <div class="toolbar">
            <button class="add-btn" id="addCategoryBtn">+ Добавить категорию</button>
        </div>
        <table>
            <thead><tr><th>Название</th><th>ID</th><th>Иконка</th><th>Товаров</th><th>Действия</th></tr></thead>
            <tbody id="categoriesTable"></tbody>
        </table>
        <p style="text-align: center; margin-top: 16px; color: #94a3b8;" id="categoryCount"></p>
    </div>
</div>

<div class="modal-overlay" id="productModal">
    <div class="modal">
        <h2 id="productModalTitle">Новый товар</h2>
        <form id="productForm">
            <input type="hidden" id="productId">
            <label>Название *</label><input type="text" id="productName" required>
            <label>Категория *</label><select id="productCategory" required></select>
            <label>Подкатегория</label><input type="text" id="productSubcategory">
            <label>Цена (число) *</label><input type="number" id="productPrice" required>
            <label>Единица</label><input type="text" id="productUnit" value="шт">
            <label>Описание</label><textarea id="productDesc"></textarea>
            <label>Ссылка на фото</label><input type="text" id="productImage" placeholder="https://...">
            <div class="modal-buttons">
                <button type="button" class="cancel-btn" id="cancelProductBtn">Отмена</button>
                <button type="submit" class="save-btn">💾 Сохранить</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="categoryModal">
    <div class="modal" style="max-width: 600px;">
        <h2 id="categoryModalTitle">Новая категория</h2>
        <form id="categoryForm">
            <input type="hidden" id="categoryOldId">
            <label>Название *</label><input type="text" id="categoryName" required placeholder="Например: Утеплители">
            <label>ID (латиница, без пробелов) *</label><input type="text" id="categoryId" required placeholder="naprimer: utepliteli">
            <small style="color: #94a3b8; display: block; margin-top: 4px;">Это техническое название, на сайте не видно</small>
            
            <label>Выберите иконку:</label>
            <input type="hidden" id="categoryIcon" value="fa-box">
            <div id="iconPicker" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 8px; max-height: 200px; overflow-y: auto; background: #0f172a; padding: 12px; border-radius: 12px;"></div>
            <p style="color: #94a3b8; font-size: 12px; margin-top: 4px;">Выбрано: <span id="selectedIconName">fa-box</span></p>
            
            <div class="modal-buttons">
                <button type="button" class="cancel-btn" id="cancelCategoryBtn">Отмена</button>
                <button type="submit" class="save-btn">💾 Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    var products = [];
    var categories = [];
    var editMode = 'new';
    
    async function loadData() {
        try {
            var pr = await fetch('https://stroy13.github.io/products.json');
            if (pr.ok) products = await pr.json();
        } catch(e) {}
        try {
            var cr = await fetch('https://stroy13.github.io/categories.json');
            if (cr.ok) categories = await cr.json();
        } catch(e) {}
        renderProducts();
        renderCategories();
    }
    
    function renderProducts() {
        var tbody = document.getElementById('productsTable');
        var search = document.getElementById('searchProducts').value.toLowerCase();
        var filtered = products.filter(function(p) { return p.name && p.name.toLowerCase().indexOf(search) !== -1; });
        document.getElementById('productCount').textContent = 'Показано: ' + filtered.length + ' из ' + products.length;
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var p = filtered[i];
            var cat = categories.find(function(c) { return c.id === p.category; });
            var catName = cat ? cat.name : (p.category || '—');
            html += '<tr>';
            html += '<td>' + (p.image ? '<img src="' + p.image + '" style="width:40px;height:40px;object-fit:cover;border-radius:8px;">' : '📦') + '</td>';
            html += '<td>' + (p.name || '') + '</td>';
            html += '<td>' + catName + '</td>';
            html += '<td>' + (p.price ? p.price.toLocaleString() : '0') + ' ₽ / ' + (p.unit || 'шт') + '</td>';
            html += '<td class="actions"><button class="edit-btn" data-edit-product="' + p.id + '">✏️</button> <button class="del-btn" data-del-product="' + p.id + '">🗑️</button></td>';
            html += '</tr>';
        }
        tbody.innerHTML = html;
        var editBtns = document.querySelectorAll('[data-edit-product]');
        for (var j = 0; j < editBtns.length; j++) {
            editBtns[j].onclick = function() { openProductModal('edit', parseInt(this.getAttribute('data-edit-product'))); };
        }
        var delBtns = document.querySelectorAll('[data-del-product]');
        for (var k = 0; k < delBtns.length; k++) {
            delBtns[k].onclick = function() { deleteProduct(parseInt(this.getAttribute('data-del-product'))); };
        }
    }
    
    function openProductModal(mode, id) {
        editMode = mode;
        var sel = document.getElementById('productCategory');
        sel.innerHTML = '';
        for (var i = 0; i < categories.length; i++) {
            sel.innerHTML += '<option value="' + categories[i].id + '">' + categories[i].name + '</option>';
        }
        if (mode === 'new') {
            document.getElementById('productModalTitle').textContent = 'Новый товар';
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productSubcategory').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productUnit').value = 'шт';
            document.getElementById('productDesc').value = '';
            document.getElementById('productImage').value = '';
        } else if (mode === 'edit' && id) {
            var p = products.find(function(x) { return x.id === id; });
            if (p) {
                document.getElementById('productModalTitle').textContent = 'Редактирование: ' + p.name;
                document.getElementById('productId').value = p.id;
                document.getElementById('productName').value = p.name;
                document.getElementById('productCategory').value = p.category;
                document.getElementById('productSubcategory').value = p.subcategory || '';
                document.getElementById('productPrice').value = p.price;
                document.getElementById('productUnit').value = p.unit || 'шт';
                document.getElementById('productDesc').value = p.desc || '';
                document.getElementById('productImage').value = p.image || '';
            }
        }
        document.getElementById('productModal').classList.add('active');
    }
    
    function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }
    
    document.getElementById('productForm').onsubmit = function(e) {
        e.preventDefault();
        var id = document.getElementById('productId').value ? parseInt(document.getElementById('productId').value) : Date.now();
        var product = {
            id: id, name: document.getElementById('productName').value.trim(),
            category: document.getElementById('productCategory').value,
            subcategory: document.getElementById('productSubcategory').value.trim(),
            price: parseInt(document.getElementById('productPrice').value) || 0,
            unit: document.getElementById('productUnit').value.trim(),
            desc: document.getElementById('productDesc').value.trim(),
            image: document.getElementById('productImage').value.trim()
        };
        if (editMode === 'new') products.push(product);
        else { var idx = products.findIndex(function(x) { return x.id === id; }); if (idx !== -1) products[idx] = product; }
        closeProductModal(); renderProducts();
        showMessage('✅ Товар сохранён локально. Нажмите «Сохранить всё на сайт».', 'success');
    };
    
    function deleteProduct(id) {
        if (!confirm('Удалить товар?')) return;
        products = products.filter(function(p) { return p.id !== id; });
        renderProducts();
        showMessage('🗑️ Товар удалён локально.', 'success');
    }
    
    var iconList = [
        'fa-cube', 'fa-cubes', 'fa-box', 'fa-boxes', 'fa-warehouse',
        'fa-circle', 'fa-draw-polygon', 'fa-shapes', 'fa-th-large',
        'fa-tree', 'fa-leaf', 'fa-seedling', 'fa-dragon',
        'fa-border-all', 'fa-th', 'fa-grip-horizontal', 'fa-grip-lines',
        'fa-hammer', 'fa-tools', 'fa-toolbox', 'fa-wrench',
        'fa-hard-hat', 'fa-helmet-safety', 'fa-ruler', 'fa-ruler-combined',
        'fa-paint-roller', 'fa-brush', 'fa-fill-drip', 'fa-tint',
        'fa-temperature-low', 'fa-temperature-high', 'fa-fire', 'fa-snowflake',
        'fa-home', 'fa-building', 'fa-industry', 'fa-city',
        'fa-water', 'fa-bolt', 'fa-wind', 'fa-sun',
        'fa-truck', 'fa-shipping-fast', 'fa-dolly', 'fa-pallet',
        'fa-star', 'fa-tag', 'fa-tags', 'fa-check-circle'
    ];
    var iconColors = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#a78bfa', '#ec4899', '#06b6d4', '#f97316', '#8b5cf6', '#14b8a6'];

    function renderIconPicker(selectedIcon) {
        var picker = document.getElementById('iconPicker');
        var html = '';
        for (var i = 0; i < iconList.length; i++) {
            var ic = iconList[i];
            var isSelected = (ic === selectedIcon);
            var color = iconColors[i % iconColors.length];
            html += '<button type="button" class="icon-option" data-icon="' + ic + '" style="background: #1e293b; border: 2px solid ' + (isSelected ? color : '#334155') + '; border-radius: 10px; padding: 10px; cursor: pointer; color: ' + color + '; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;"><i class="fas ' + ic + '"></i></button>';
        }
        picker.innerHTML = html;
        document.getElementById('selectedIconName').textContent = selectedIcon;
        var btns = picker.querySelectorAll('.icon-option');
        for (var j = 0; j < btns.length; j++) {
            btns[j].onclick = function() {
                var icon = this.getAttribute('data-icon');
                document.getElementById('categoryIcon').value = icon;
                renderIconPicker(icon);
            };
        }
    }

    function renderCategories() {
        var tbody = document.getElementById('categoriesTable');
        document.getElementById('categoryCount').textContent = 'Всего категорий: ' + categories.length;
        var html = '';
        for (var i = 0; i < categories.length; i++) {
            var c = categories[i];
            var count = products.filter(function(p) { return p.category === c.id; }).length;
            html += '<tr>';
            html += '<td>' + c.name + '</td>';
            html += '<td><code>' + c.id + '</code></td>';
            html += '<td><i class="fas ' + c.icon + '"></i></td>';
            html += '<td>' + count + '</td>';
            html += '<td class="actions"><button class="edit-btn" data-edit-cat="' + c.id + '">✏️</button> <button class="del-btn" data-del-cat="' + c.id + '">🗑️</button></td>';
            html += '</tr>';
        }
        tbody.innerHTML = html;
        var editBtns = document.querySelectorAll('[data-edit-cat]');
        for (var j = 0; j < editBtns.length; j++) {
            editBtns[j].onclick = function() { openCategoryModal('edit', this.getAttribute('data-edit-cat')); };
        }
        var delBtns = document.querySelectorAll('[data-del-cat]');
        for (var k = 0; k < delBtns.length; k++) {
            delBtns[k].onclick = function() { deleteCategory(this.getAttribute('data-del-cat')); };
        }
    }
    
    function openCategoryModal(mode, id) {
        if (mode === 'new') {
            document.getElementById('categoryModalTitle').textContent = 'Новая категория';
            document.getElementById('categoryOldId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryIcon').value = 'fa-box';
            renderIconPicker('fa-box');
        } else {
            var c = categories.find(function(x) { return x.id === id; });
            if (c) {
                document.getElementById('categoryModalTitle').textContent = 'Редактирование: ' + c.name;
                document.getElementById('categoryOldId').value = c.id;
                document.getElementById('categoryName').value = c.name;
                document.getElementById('categoryId').value = c.id;
                document.getElementById('categoryIcon').value = c.icon;
                renderIconPicker(c.icon);
            }
        }
        document.getElementById('categoryModal').classList.add('active');
    }
    
    function closeCategoryModal() { document.getElementById('categoryModal').classList.remove('active'); }
    
    document.getElementById('categoryForm').onsubmit = function(e) {
        e.preventDefault();
        var oldId = document.getElementById('categoryOldId').value;
        var newCat = {
            id: document.getElementById('categoryId').value.trim().toLowerCase().replace(/\s+/g, '-'),
            name: document.getElementById('categoryName').value.trim(),
            icon: document.getElementById('categoryIcon').value.trim()
        };
        if (oldId) {
            var idx = categories.findIndex(function(x) { return x.id === oldId; });
            if (idx !== -1) categories[idx] = newCat;
            if (oldId !== newCat.id) {
                for (var i = 0; i < products.length; i++) {
                    if (products[i].category === oldId) products[i].category = newCat.id;
                }
                renderProducts();
            }
        } else { categories.push(newCat); }
        closeCategoryModal(); renderCategories();
        showMessage('✅ Категория сохранена локально.', 'success');
    };
    
    function deleteCategory(id) {
        if (!confirm('Удалить категорию?')) return;
        categories = categories.filter(function(c) { return c.id !== id; });
        renderCategories();
    }
    
    async function saveToGitHub(filename, data) {
        var token = document.getElementById('githubToken').value.trim();
        if (!token) { showMessage('❌ Введите GitHub Token!', 'error'); return false; }
        try {
            var getResp = await fetch('https://api.github.com/repos/stroy13/stroy13.github.io/contents/' + filename, {
                headers: { 'Authorization': 'token ' + token }
            });
            var getData = await getResp.json();
            var sha = getData.sha;
            var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            var putResp = await fetch('https://api.github.com/repos/stroy13/stroy13.github.io/contents/' + filename, {
                method: 'PUT',
                headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Обновление через админ-панель', content: content, sha: sha })
            });
            return putResp.ok;
        } catch(e) { return false; }
    }
    
    async function saveAll() {
        var ok1 = await saveToGitHub('products.json', products);
        var ok2 = await saveToGitHub('categories.json', categories);
        if (ok1 && ok2) showMessage('✅ Всё сохранено на сайт!', 'success');
        else showMessage('❌ Ошибка сохранения.', 'error');
    }
    
    function showMessage(text, type) {
        document.getElementById('messageContainer').innerHTML = '<div class="message ' + type + '">' + text + '</div>';
        setTimeout(function() { document.getElementById('messageContainer').innerHTML = ''; }, 5000);
    }
    
    document.getElementById('saveAllBtn').onclick = saveAll;
    document.getElementById('addProductBtn').onclick = function() { openProductModal('new'); };
    document.getElementById('addCategoryBtn').onclick = function() { openCategoryModal('new'); };
    document.getElementById('cancelProductBtn').onclick = closeProductModal;
    document.getElementById('cancelCategoryBtn').onclick = closeCategoryModal;
    document.getElementById('searchProducts').oninput = renderProducts;
    
    document.querySelectorAll('.tab').forEach(function(tab) {
        tab.onclick = function() {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(tc) { tc.classList.remove('active'); });
            this.classList.add('active');
            document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
        };
    });
    
    document.getElementById('productModal').onclick = function(e) { if (e.target === this) closeProductModal(); };
    document.getElementById('categoryModal').onclick = function(e) { if (e.target === this) closeCategoryModal(); };
    document.onkeydown = function(e) { if (e.key === 'Escape') { closeProductModal(); closeCategoryModal(); } };
    
    loadData();
})();
</script>
</body>
</html>
